<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrollGui</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
<text x=%2210%22 y=%2270%22 font-size=%2270%22 fill=%22white%22>T</text>
<text x=%2245%22 y=%2270%22 font-size=%2220%22 fill=%2200ffff%22>roll</text>
</svg>">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI; }

body {
    background: radial-gradient(circle at top, #2a2a2a, #111);
    color:white;
    overflow:hidden;
}

/* LOADING */
.loader {
    position:fixed;
    width:100%;
    height:100%;
    background:#0a0a0a;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    font-size:24px;
    letter-spacing:3px;
    color:#00ffff;
    text-shadow:0 0 10px #00ffff;
    animation: fadeOut 1s ease 2s forwards;
}

@keyframes fadeOut {
    to { opacity:0; visibility:hidden; }
}

/* PARTICLES */
canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:-2;
}

/* GRID 3D FUNDO */
.grid {
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(#00ffff11 1px, transparent 1px),
    linear-gradient(90deg, #00ffff11 1px, transparent 1px);
    background-size:50px 50px;
    transform: perspective(600px) rotateX(65deg);
    animation: gridMove 12s linear infinite;
    z-index:-3;
}

@keyframes gridMove {
    from { background-position:0 0; }
    to { background-position:0 50px; }
}

/* GLOW MOUSE */
.glow {
    position:fixed;
    width:300px;
    height:300px;
    background: radial-gradient(circle, #00ffff55, transparent 70%);
    pointer-events:none;
    transform: translate(-50%, -50%);
    z-index:-1;
}

/* NAV */
.navbar {
    padding:20px 50px;
}

.logo .t { font-size:30px; }
.logo .resto { color:#00ffff; font-size:14px; }

/* CENTER */
.center {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.card {
    backdrop-filter: blur(25px);
    background: rgba(0,0,0,0.6);
    border:1px solid #00ffff22;
    padding:70px;
    border-radius:20px;
    box-shadow:
        0 0 60px rgba(0,0,0,0.8),
        0 0 40px #00ffff22;
    text-align:center;
    transition:0.3s;
}

.card:hover {
    box-shadow:
        0 0 80px rgba(0,0,0,0.9),
        0 0 60px #00ffff44;
}

/* TITLE */
.title {
    font-size:64px;
    margin-bottom:30px;
    text-shadow:
        0 0 10px #00ffff,
        0 0 30px #00ffff55;
}

/* BUTTON */
.btn {
    position:relative;
    padding:16px 40px;
    border-radius:14px;
    border:1px solid #00ffff88;
    background:rgba(0,255,255,0.05);
    color:#00ffff;
    font-size:15px;
    cursor:pointer;
    overflow:hidden;
    transition:0.3s;
}

/* brilho */
.btn::before {
    content:"";
    position:absolute;
    top:0;
    left:-80%;
    width:50%;
    height:100%;
    background:linear-gradient(120deg, transparent, #00ffffaa, transparent);
}

.btn:hover::before {
    animation: brilho 1s forwards;
}

@keyframes brilho { to { left:120%; } }

.btn:hover {
    transform:scale(1.07);
    box-shadow:
        0 0 20px #00ffff,
        0 0 40px #00ffff55;
}

.btn:active {
    background:#00ffff22;
    transform:scale(0.95);
}

/* TOAST */
.toast {
    position:fixed;
    bottom:30px;
    right:30px;
    background:linear-gradient(135deg,#00ffcc,#00cc99);
    color:black;
    padding:15px 25px;
    border-radius:12px;
    opacity:0;
    transform:translateY(20px);
    transition:0.3s;
    box-shadow:0 0 20px #00ffcc55;
}

.toast.show {
    opacity:1;
    transform:translateY(0);
}
</style>
</head>

<body>

<div class="loader">Loading TrollGui...</div>

<div class="grid"></div>
<div class="glow" id="glow"></div>

<canvas id="particles"></canvas>

<div class="navbar">
    <div class="logo">
        <span class="t">T</span>
        <span class="resto">rollGui</span>
    </div>
</div>

<div class="center">
    <div class="card">
        <div class="title">TrollGui</div>
        <button class="btn" onclick="copiarScript()">Get TrollGui Script</button>
    </div>
</div>

<div id="toast" class="toast">Script copiado!</div>

<audio id="clickSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1f58.mp3">
</audio>

<script>
// SCRIPT CONFIG
const scriptParaCopiar = `COLE SEU SCRIPT AQUI`;

// COPY
function copiarScript(){
    navigator.clipboard.writeText(scriptParaCopiar);

    document.getElementById("clickSound").play();

    let toast = document.getElementById("toast");
    toast.classList.add("show");

    setTimeout(()=> toast.classList.remove("show"), 3000);
}

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        d:Math.random()*0.8
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(0,255,255,0.5)";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
    });
    move();
}

function move(){
    particles.forEach(p=>{
        p.y+=p.d;
        if(p.y>canvas.height) p.y=0;
    });
}

setInterval(draw,30);

// GLOW MOUSE
document.addEventListener("mousemove", (e)=>{
    const glow = document.getElementById("glow");
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});
</script>

</body>
</html>
