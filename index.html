<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TrollGui</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
<text x=%2210%22 y=%2270%22 font-size=%2270%22 fill=%22white%22>T</text>
</svg>">

<!-- ================= STYLE ================= -->
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:#111;
color:white;
overflow:hidden;
}

/* ========= PARTICLES CANVAS ========= */
#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* ========= NAVBAR ========= */

.navbar{
display:flex;
gap:20px;
padding:20px 40px;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
text-shadow:0 0 15px rgba(255,255,255,.3);
}

.tabs{
margin-left:40px;
display:flex;
gap:10px;
}

.tab{
padding:10px 22px;
border-radius:10px;
cursor:pointer;
background:#444;
transition:.3s;
}

.tab.active{
background:white;
color:black;
font-weight:bold;
}

.tab:hover{
transform:scale(1.05);
}

/* ========= PAGES ========= */

.page{
display:none;
height:calc(100vh - 80px);
overflow:auto;
}

.page.active{
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* ========= CARD ========= */

.card{
backdrop-filter:blur(20px);
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
padding:60px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,.6);
text-align:center;
}

.title{
font-size:64px;
text-shadow:0 0 25px rgba(255,255,255,.2);
margin-bottom:30px;
}

/* ========= BUTTON ========= */

.btn{
background:linear-gradient(135deg,#4da6ff,#7f5cff);
border:none;
padding:15px 35px;
border-radius:12px;
color:white;
font-size:16px;
cursor:pointer;
transition:.25s;
box-shadow:0 0 20px rgba(77,166,255,.4);
}

.btn:hover{
transform:scale(1.08);
}

.btn:active{
transform:scale(.92);
}

/* ========= GRID ========= */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:40px;
width:90%;
max-width:1100px;
}

.funcCard{
background:#1e1e1e;
border-radius:14px;
padding:35px;
cursor:pointer;
text-align:center;
transition:.25s;
border:2px solid transparent;
}

.funcCard:hover{
transform:translateY(-6px);
border-color:#4da6ff;
box-shadow:0 0 20px rgba(77,166,255,.4);
}

/* ========= MODAL ========= */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:center;
}

.modalContent{
background:#181818;
padding:40px;
border-radius:15px;
max-width:700px;
max-height:80vh;
overflow:auto;
}

.modal h2{
margin-bottom:15px;
}

/* ========= TOAST ========= */

.toast{
position:fixed;
bottom:30px;
right:30px;
background:#2ecc71;
padding:15px 25px;
border-radius:10px;
opacity:0;
transition:.4s;
}

.toast.show{
opacity:1;
}

/* scrollbar */
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:#555;border-radius:10px;}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- NAVBAR -->
<div class="navbar">
<div class="logo">TrollGui</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('downloads',this)">Downloads</div>
<div class="tab" onclick="switchTab('functions',this)">Functions</div>
</div>
</div>

<!-- ================= DOWNLOAD PAGE ================= -->
<div id="downloads" class="page active">

<div class="card">
<div class="title">TrollGui</div>
<button class="btn" onclick="copiarScript()">Get TrollGui</button>
</div>

</div>

<!-- ================= FUNCTIONS PAGE ================= -->
<div id="functions" class="page">

<div class="grid" id="functionsGrid"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
<div class="modalContent" onclick="event.stopPropagation()">
<h2 id="modalTitle"></h2>
<p id="modalText"></p>
</div>
</div>

<div id="toast" class="toast">Script copied!</div>

<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1f58.mp3?filename=click-124467.mp3">

<script>

/* ================= PARTICLES ================= */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
s:Math.random()*2,
v:1+Math.random()*2
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

particles.forEach(p=>{
p.y+=p.v;
if(p.y>canvas.height)p.y=0;
ctx.fillRect(p.x,p.y,p.s,p.s);
});

requestAnimationFrame(animate);
}
animate();

/* ================= TAB SYSTEM ================= */

function switchTab(id,el){

document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));

document.getElementById(id).classList.add("active");

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

el.classList.add("active");

clickSound.play();
}

/* ================= COPY ================= */

const scriptParaCopiar=`loadstring(game:HttpGet("https://raw.githubusercontent.com/TrollGui/TrollGuiScript/refs/heads/main/TrollGui"))()`;

function copiarScript(){
navigator.clipboard.writeText(scriptParaCopiar);

toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),2500);

clickSound.play();
}

/* criar cards */

const grid=document.getElementById("functionsGrid");

functionsData.forEach(f=>{
let div=document.createElement("div");
div.className="funcCard";
div.innerText=f.title;
div.onclick=()=>openModal(f.title,f.text);
grid.appendChild(div);
});

/* modal */

function openModal(title,text){
modal.style.display="flex";
modalTitle.innerText=title;
modalText.innerText=text;
clickSound.play();
}

function closeModal(){
modal.style.display="none";
}

</script>
